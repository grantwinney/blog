{{ define "main" }}
<main class="main">
  <div class="post-list">
    {{ range .Paginator.Pages }}
      <article class="post-entry">
        <header class="entry-header">
          <h2>{{ .Title }}</h2>
        </header>

        <section class="entry-content">
          {{ .Summary }}
        </section>

        <footer class="entry-footer">
          <time>{{ .Date.Format "Jan 2, 2006" }}</time>
        </footer>
      </article>
    {{ end }}
  </div>
</main>
{{ end }}
